name: Workflow CI - Heart Disease Model

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install mlflow dagshub pandas numpy scikit-learn matplotlib seaborn

      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: https://dagshub.com/zulfiana92/Eksperimen_SML_Zulfiana-Majid.mlflow
        run: |
          cd MLProject
          python modelling.py

      - name: Get Latest Run ID
        id: get_run_id
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: https://dagshub.com/zulfiana92/Eksperimen_SML_Zulfiana-Majid.mlflow
        run: |
          RUN_ID=$(python -c "import mlflow; import os; os.environ['MLFLOW_TRACKING_URI']='https://dagshub.com/zulfiana92/Eksperimen_SML_Zulfiana-Majid.mlflow'; client=mlflow.tracking.MlflowClient(); runs=client.search_runs('2',order_by=['start_time DESC'],max_results=1); print(runs[0].info.run_id)")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            MLProject/confusion_matrix.png
            MLProject/feature_importance.png
            MLProject/roc_curve.png
            MLProject/classification_report.txt

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image with MLflow
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/zulfiana92/Eksperimen_SML_Zulfiana-Majid.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow models build-docker \
            --model-uri "models:/random_forest_model/latest" \
            --name "${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-model:latest"